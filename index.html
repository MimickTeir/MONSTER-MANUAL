function Lbl({children}) {
  return <div style={{fontSize:10,letterSpacing:3,color:DIM,fontFamily:"'Cinzel',serif",marginBottom:6,textTransform:"uppercase"}}>{children}</div>;
}
function Tag({c="#94a3b8",children}) {

}

function CRRangePicker({selected, onChange}) {
  const toggle = cr => { const next = new Set(selected); if(next.has(cr)) next.delete(cr); else next.add(cr); onChange(next); };
  const selectAll = () => onChange(new Set());
  const selectRange = (lo,hi) => { const next = new Set(selected); for(let i=lo;i<=hi;i++) next.add(i); onChange(next); };
  const tiers = [{label:"Low",lo:1,hi:6,col:"#4ade80"},{label:"Moderate",lo:7,hi:12,col:"#a3e635"},{label:"High",lo:13,hi:18,col:"#facc15"},{label:"Extreme",lo:19,hi:24,col:"#f97316"},{label:"Legendary",lo:25,hi:30,col:"#ef4444"}];
  const active = selected.size > 0;
  return (
    <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${active?"rgba(200,170,100,0.4)":"rgba(200,170,100,0.15)"}`,borderRadius:8,padding:"12px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <Lbl>CR Range</Lbl>
        {active ? <button onClick={selectAll} style={{fontSize:10,background:"transparent",border:"none",color:DIM,fontFamily:"'Cinzel',serif",letterSpacing:1}}>{"✕ clear"}</button> : <span style={{fontSize:10,color:DIM,fontFamily:"'Crimson Text',serif",fontStyle:"italic"}}>all</span>}
      </div>
      {tiers.map(({label,lo,hi,col}) => (
        <div key={label} style={{marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
            <button onClick={()=>selectRange(lo,hi)} style={{fontSize:9,letterSpacing:1,color:col,background:`${col}12`,border:`1px solid ${col}30`,borderRadius:4,padding:"1px 7px",fontFamily:"'Cinzel',serif"}}>{label}</button>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {Array.from({length:hi-lo+1},(_,i)=>lo+i).map(cr => {
              const on = selected.has(cr);
              return (<button key={cr} className="cr-pip" onClick={()=>toggle(cr)} style={{width:26,height:26,borderRadius:5,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:on?`${col}30`:"rgba(255,255,255,0.04)",border:`1px solid ${on?col:"rgba(255,255,255,0.1)"}`,color:on?col:"rgba(255,255,255,0.25)",transition:"all 0.12s"}}>{cr}</button>);
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

const SIZES = ["Tiny","Small","Medium","Large","Huge","Gargantuan"];

function BackToTop() {
  const [show,setShow] = useState(false);
  useEffect(()=>{
    const h = ()=> setShow(window.scrollY > 400);
    window.addEventListener("scroll",h);
    return ()=>window.removeEventListener("scroll",h);
  },[]);
  if(!show) return null;
  return (
    <button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})} style={{
      position:"fixed",bottom:20,right:20,zIndex:9000,
      width:44,height:44,borderRadius:"50%",
      background:"rgba(8,6,4,0.95)",border:`1px solid ${G}50`,
      color:G,fontSize:18,fontFamily:"'Cinzel',serif",
      boxShadow:`0 0 20px rgba(0,0,0,0.5), 0 0 8px ${G}20`,
      display:"flex",alignItems:"center",justifyContent:"center",
    }}>{"↑"}</button>
  );
}

function EditModal({entryKey,god,biome,cr,entry,onSave,onDelete,onClose}) {
  const defaults = QMB[cr]||{};
  const [f,setF] = useState({
    name:"",type:"Mammals",description:"",abilities:"",lore:"",
    size:"Medium",creatureType:"Beast",alignment:"unaligned",
    ac:"",hp:"",speed:"",
    str:"",dex:"",con:"",int:"",wis:"",cha:"",
    skills:"",senses:"",languages:"",resistances:"",vulnerabilities:"",immunities:"",
    traits:"",actions:"",bonusActions:"",reactions:"",
    gear:"",
    ...(entry||{})
  });
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  const gc = GOD_COLORS[god];
  const [showStats,setShowStats] = useState(false);

  const autoFill = () => {
    const d = defaults;
    if(!d.ac) return;
    const mods = (d.abils||"").split(",").map(Number);
    setF(p=>({...p,
      ac: p.ac || String(d.ac),
      hp: p.hp || String(d.hp),
      str: p.str || String(10 + (mods[0]||0)*2),
      dex: p.dex || String(10 + (mods[1]||0)*2),
      con: p.con || String(10 + (mods[2]||0)*2),
      int: p.int || String(10 + (mods[3]||0)*2),
      wis: p.wis || String(10 + (mods[4]||0)*2),
      cha: p.cha || String(10 + (mods[5]||0)*2),
    }));
  };

  const si = {...inp,height:36,padding:"6px 10px",fontSize:13};
  const half = {display:"grid",gridTemplateColumns:"1fr 1fr",gap:8};
  const third = {display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div className="anim" style={{...panel(`${gc}50`),width:"100%",maxWidth:620,maxHeight:"90vh",overflowY:"auto",boxShadow:`0 0 50px ${gc}18`}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:G,letterSpacing:1}}>
            {entry?.name ? `Edit — ${entry.name}` : `New Creature · ${god} · ${biome} · CR ${cr}`}
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:MUTED,fontSize:18}}>{"✕"}</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 160px",gap:12,marginBottom:14}}>
          <div><Lbl>Name</Lbl><input value={f.name} onChange={e=>s("name",e.target.value)} placeholder="Creature name…" style={inp}/></div>
          <div><Lbl>Classification</Lbl>
            <select value={f.type} onChange={e=>s("type",e.target.value)} style={{...inp,cursor:"pointer",height:38}}>
              {TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          <div><Lbl>Size</Lbl>
            <select value={f.size} onChange={e=>s("size",e.target.value)} style={{...inp,cursor:"pointer",height:36,fontSize:13}}>
              {SIZES.map(sz=><option key={sz}>{sz}</option>)}
            </select>
          </div>
          <div><Lbl>Creature Type</Lbl>
            <select value={f.creatureType} onChange={e=>s("creatureType",e.target.value)} style={{...inp,cursor:"pointer",height:36,fontSize:13}}>
              {CREATURE_TYPES.map(ct=><option key={ct}>{ct}</option>)}
            </select>
          </div>
          <div><Lbl>Alignment</Lbl><input value={f.alignment} onChange={e=>s("alignment",e.target.value)} style={si} placeholder="unaligned"/></div>
        </div>

        <div style={{marginBottom:14}}><Lbl>Description</Lbl><textarea value={f.description} onChange={e=>s("description",e.target.value)} rows={2} placeholder="Appearance, behaviour, ecology…" style={inp}/></div>

        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <button onClick={()=>setShowStats(!showStats)} style={{...btnS(showStats?G:MUTED),fontSize:11,padding:"4px 14px"}}>
              {showStats ? "▼ Stat Block" : "▶ Stat Block"}
            </button>
            {showStats && defaults.ac && <button onClick={autoFill} style={{...btnS("#4ade80"),fontSize:10,padding:"3px 10px"}}>Auto-fill from CR {cr}</button>}
          </div>

          {showStats && (<div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(200,170,100,0.12)",borderRadius:8,padding:14}}>
            <div style={third}>
              <div><Lbl>AC</Lbl><input value={f.ac} onChange={e=>s("ac",e.target.value)} style={si} placeholder={defaults.ac?String(defaults.ac):""}/></div>
              <div><Lbl>HP</Lbl><input value={f.hp} onChange={e=>s("hp",e.target.value)} style={si} placeholder={defaults.hp?String(defaults.hp):""}/></div>
              <div><Lbl>Speed</Lbl><input value={f.speed} onChange={e=>s("speed",e.target.value)} style={si} placeholder="30 ft."/></div>
            </div>

            <div style={{marginTop:10,...Object.assign({},{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6})}}>
              {["str","dex","con","int","wis","cha"].map(ab=>(
                <div key={ab}>
                  <div style={{fontSize:9,letterSpacing:2,color:DIM,fontFamily:"'Cinzel',serif",marginBottom:3,textTransform:"uppercase",textAlign:"center"}}>{ab}</div>
                  <input value={f[ab]} onChange={e=>s(ab,e.target.value)} style={{...si,textAlign:"center",padding:"6px 4px"}} placeholder="10"/>
                </div>
              ))}
            </div>

            <div style={{marginTop:10,...half}}>
              <div><Lbl>Skills</Lbl><input value={f.skills} onChange={e=>s("skills",e.target.value)} style={si} placeholder="Stealth +4, Perception +3"/></div>
              <div><Lbl>Senses</Lbl><input value={f.senses} onChange={e=>s("senses",e.target.value)} style={si} placeholder="darkvision 60 ft."/></div>
            </div>
            <div style={{marginTop:8,...half}}>

function SearchPage({monsters,openEdit}) {
  const [god,setGod]=useState("Any");
  const [biome,setBiome]=useState("Any");
  const [type,setType]=useState("Any");
  const [selCRs,setSelCRs]=useState(new Set());
  const [search,setSearch]=useState("");

  const allEntries = [];
  GODS.forEach(g=>BIOMES.forEach(b=>[0,1,2,3,4].forEach(i=>{
    const key=`${g}|${b}|${i}`;
    const e=monsters[key];
    if(e?.name) allEntries.push({key,god:g,biome:b,slot:i,cr:getCR(g,b,i),...e});
  })));

  const filtered = allEntries.filter(e=>
    (god==="Any"||e.god===god)&&
    (biome==="Any"||e.biome===biome)&&
    (type==="Any"||(e.type||"Mammals")===type)&&
    (selCRs.size===0||selCRs.has(e.cr))&&
    (!search||e.name.toLowerCase().includes(search.toLowerCase()))
  );

  const hasFilters = god!=="Any"||biome!=="Any"||type!=="Any"||selCRs.size>0||search;
  const showEmptySlots = god!=="Any"&&biome!=="Any"&&type==="Any"&&selCRs.size===0&&!search;
  const emptySlots = showEmptySlots
    ? [0,1,2,3,4].filter(i=>!monsters[`${god}|${biome}|${i}`]?.name).map(i=>({key:`${god}|${biome}|${i}`,god,biome,slot:i,cr:getCR(god,biome,i)}))
    : [];

  const selStyle = active => ({...inp,cursor:"pointer",height:40,border:`1px solid ${active?"rgba(200,170,100,0.5)":"rgba(200,170,100,0.18)"}`});
  const display  = hasFilters ? filtered : allEntries.slice(0,50);
  const capped = !hasFilters && allEntries.length > 50;

  return (
    <div style={{maxWidth:800,margin:"0 auto"}}>
      <div style={{...panel(),marginBottom:20}}>
        <div style={{marginBottom:12}}>
          <Lbl>Search</Lbl>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name…" style={{...inp,height:40}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12,marginBottom:14}}>
          <div>
            <Lbl>God Domain</Lbl>
            <select value={god} onChange={e=>setGod(e.target.value)} style={selStyle(god!=="Any")}>
              <option value="Any">Any God</option>
              {GODS.map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
          <div>
            <Lbl>Biome</Lbl>
            <select value={biome} onChange={e=>setBiome(e.target.value)} style={selStyle(biome!=="Any")}>
              <option value="Any">Any Biome</option>
              {BIOMES.map(b=><option key={b}>{BIOME_ICONS[b]} {b}</option>)}
            </select>
          </div>
          <div>
            <Lbl>Classification</Lbl>
            <select value={type} onChange={e=>setType(e.target.value)} style={selStyle(type!=="Any")}>
              <option value="Any">Any</option>
              {TYPES.map(t=><option key={t}>{TYPE_ICONS[t]} {t}</option>)}
            </select>
          </div>
        </div>
        <CRRangePicker selected={selCRs} onChange={setSelCRs}/>
        {hasFilters&&(
          <div style={{marginTop:12,display:"flex",justifyContent:"flex-end"}}>
            <button onClick={()=>{setGod("Any");setBiome("Any");setType("Any");setSelCRs(new Set());setSearch("");}} style={{...btnS(MUTED),fontSize:11,padding:"4px 12px"}}>{"✕ Clear all filters"}</button>
          </div>
        )}
      </div>

      <div style={{fontFamily:"'Crimson Text',serif",fontStyle:"italic",fontSize:14,color:MUTED,marginBottom:16,textAlign:"center"}}>
        {hasFilters
          ? `${filtered.length} match${filtered.length!==1?"es":""}${emptySlots.length?` · ${emptySlots.length} empty slot${emptySlots.length!==1?"s":""}`:""}`
          : `${allEntries.length} creatures in the codex${capped?" (showing first 50 — use filters)":""}`}
      </div>

      {display.length===0&&emptySlots.length===0&&(
        <div style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{fontSize:40,opacity:0.1,marginBottom:12}}>{"🔍"}</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:MUTED,letterSpacing:1}}>
            {hasFilters?"No creatures match these filters.":"No creatures yet."}
          </div>
        </div>
      )}

      {emptySlots.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,letterSpacing:3,color:DIM,fontFamily:"'Cinzel',serif",marginBottom:8}}>{"EMPTY SLOTS — "}{god} {" · "}{BIOME_ICONS[biome]} {biome}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {emptySlots.map(sl=>{
              const col=crCol(sl.cr);
              return (
                <button key={sl.key} onClick={()=>openEdit(sl.key,sl.god,sl.biome,sl.cr,null)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 14px",borderRadius:8,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.09)",minWidth:60}}>
                  <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'Cinzel',serif"}}>CR</span>
                  <span style={{fontSize:17,fontWeight:800,color:col,fontFamily:"'JetBrains Mono',monospace",lineHeight:1}}>{sl.cr}</span>
                  <span style={{fontSize:8,color:"rgba(255,255,255,0.15)"}}>+ add</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {display.sort((a,b)=>a.cr-b.cr).map(e=>{
          const gc=GOD_COLORS[e.god];
          const col=crCol(e.cr);
          return (
            <div key={e.key} className="anim" style={{...panel(`${col}28`),display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:52,flexShrink:0}}>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:col,lineHeight:1,letterSpacing:1}}>CR</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:900,color:col,lineHeight:1}}>{e.cr}</div>
                <div style={{fontSize:8,color:col,letterSpacing:1,fontFamily:"'Cinzel',serif",marginTop:2}}>{crTier(e.cr)}</div>
              </div>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:17,fontWeight:700,color:G,letterSpacing:1,marginBottom:6}}>{e.name}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:e.description?8:0}}>
                  {e.type&&<Tag c={gc}>{TYPE_ICONS[e.type]||"🐾"} {e.type}</Tag>}
                  <Tag c="#94a3b8">{BIOME_ICONS[e.biome]} {e.biome}</Tag>
                  <Tag c={gc}>{"⚡"} {e.god}</Tag>
                </div>
                {e.description&&<p style={{fontFamily:"'Crimson Text',serif",fontSize:15,color:MUTED,fontStyle:"italic",lineHeight:1.6,marginTop:6}}>{e.description.length>160?e.description.slice(0,160)+"…":e.description}</p>}
              </div>
              <button onClick={()=>openEdit(e.key,e.god,e.biome,e.cr,e)} style={{...btnS(gc),alignSelf:"flex-start",whiteSpace:"nowrap",flexShrink:0}}>{"✎ Edit"}</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TomePage({monsters,openEdit}) {
  const refs = useRef({});
  const allEntries = [];
  GODS.forEach(g=>BIOMES.forEach(b=>[0,1,2,3,4].forEach(i=>{
    const key=`${g}|${b}|${i}`;
    const e=monsters[key];
    if(e?.name) allEntries.push({key,god:g,biome:b,slot:i,cr:getCR(g,b,i),...e});
  })));

  const byType = {};
  TYPES.forEach(t=>{byType[t]=[];});
  allEntries.forEach(e=>{const t=e.type||"Mammals";if(byType[t])byType[t].push(e);});
  TYPES.forEach(t=>byType[t].sort((a,b)=>a.cr-b.cr));
  const usedTypes = TYPES.filter(t=>byType[t].length>0);
  const scrollTo = id => { const el=refs.current[id]; if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); };

  if(allEntries.length===0) return (
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontSize:44,opacity:0.1,marginBottom:14}}>{"📖"}</div>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:MUTED,letterSpacing:1}}>The tome is empty.</div>

      </div>

      <div ref={el=>refs.current["toc"]=el} style={{...panel("rgba(200,170,100,0.15)"),marginBottom:32,background:"rgba(12,9,6,0.98)"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:G,letterSpacing:2,marginBottom:14,textAlign:"center"}}>TABLE OF CONTENTS</div>
        <div style={{height:1,background:`linear-gradient(90deg,transparent,${DIM},transparent)`,marginBottom:16}}/>

                    <p style={{fontFamily:"'Crimson Text',serif",fontSize:16,color:MUTED,fontStyle:"italic",lineHeight:1.7}}>{"“"}{e.lore}{"”"}</p>
                  </div>
                )}

                <div style={{display:"flex",justifyContent:"flex-end"}}>
                  <button onClick={()=>scrollTo("toc")} style={{fontSize:10,background:"transparent",border:"none",color:DIM,fontFamily:"'Cinzel',serif",letterSpacing:1}}>{"↑ Back to contents"}</button>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function FloraPage({floraData,openFloraEdit}) {
  const [biome,setBiome]=useState("Grassland");
  const selStyle = {...inp,cursor:"pointer",height:40,border:"1px solid rgba(200,170,100,0.5)"};
  const biomeFlora = floraData[biome]||{};
  return (
    <div style={{maxWidth:800,margin:"0 auto"}}>
      <div style={{...panel(),marginBottom:20}}>
        <Lbl>Select Biome</Lbl>
        <select value={biome} onChange={e=>setBiome(e.target.value)} style={selStyle}>
          {BIOMES.map(b=><option key={b}>{b}</option>)}
        </select>
      </div>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:32,marginBottom:4}}>{BIOME_ICONS[biome]}</div>
        <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:20,fontWeight:700,color:G,letterSpacing:2}}>{biome.toUpperCase()} FLORA</div>
        <div style={{fontFamily:"'Crimson Text',serif",fontStyle:"italic",fontSize:14,color:MUTED,marginTop:4}}>{"20 sacred plants — one per god"}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {GODS.map(god=>{
          const gc = GOD_COLORS[god];
          const entry = biomeFlora[god];
          const name = entry?.name || "— empty —";
          const hasContent = entry?.name;
          return (
            <div key={god} className="flora-row" onClick={()=>openFloraEdit(biome,god,entry)} style={{
              ...panel(`${gc}20`),padding:"12px 16px",display:"flex",alignItems:"center",gap:14,
              cursor:"pointer",transition:"background 0.15s",opacity:hasContent?1:0.6,
            }}>
              <div style={{width:10,height:10,borderRadius:"50%",background:gc,flexShrink:0,boxShadow:`0 0 8px ${gc}40`}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:12,color:gc,letterSpacing:1,flexShrink:0}}>{god}</span>
                  <span style={{fontFamily:"'Crimson Text',serif",fontSize:16,color:hasContent?TEXT:DIM,fontStyle:hasContent?"normal":"italic"}}>{name}</span>
                </div>
                {entry?.description&&<p style={{fontFamily:"'Crimson Text',serif",fontSize:13,color:MUTED,fontStyle:"italic",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.description}</p>}
              </div>
              <span style={{fontSize:11,color:DIM,fontFamily:"'Cinzel',serif",flexShrink:0}}>{"✎"}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── FIREBASE HELPERS ─────────────────────────────────────────────────────────
let fbDb = null;
let fbRef = null;

function initFirebase(config) {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(config);
    }
    fbDb = firebase.database();
    fbRef = fbDb.ref("monster-manual/edits");
    return true;
  } catch(e) {
    console.error("Firebase init failed:", e);
    return false;
  }
}

async function fbLoad() {
  if (!fbRef) return null;
  try {
    const snap = await fbRef.once("value");
    return snap.val();
  } catch(e) {
    console.error("Firebase load failed:", e);
    return null;
  }
}

async function fbSave(edits) {
  if (!fbRef) return false;
  try {
    await fbRef.set(edits);
    return true;
  } catch(e) {
    console.error("Firebase save failed:", e);
    return false;
  }
}

function getEdits(monsters, floraData) {
  const edits = {};
  for (const [k,v] of Object.entries(monsters)) {
    const d = DEFAULT_MONSTERS[k];
    if (!d || v.name !== d.name || v.type !== d.type || v.description || v.abilities || v.lore
        || v.ac || v.hp || v.speed || v.str || v.traits || v.actions || v.gear
        || v.size !== "Medium" || v.creatureType !== "Beast") {
      edits[k] = v;
    }
  }
  const floraEdits = {};
  for (const [biome, gods] of Object.entries(floraData)) {
    for (const [god, entry] of Object.entries(gods)) {
      const d = DEFAULT_FLORA[biome]?.[god];
      if (!d || entry.name !== d.name || entry.description || entry.lore) {
        if (!floraEdits[biome]) floraEdits[biome] = {};
        floraEdits[biome][god] = entry;
      }
    }
  }
  return { m: edits, f: floraEdits };
}

function applyEdits(edits) {
  const monsters = { ...DEFAULT_MONSTERS };
  if (edits?.m) Object.assign(monsters, edits.m);
  const floraData = JSON.parse(JSON.stringify(DEFAULT_FLORA));
  if (edits?.f) {
    for (const [biome, gods] of Object.entries(edits.f)) {
      if (!floraData[biome]) floraData[biome] = {};
      Object.assign(floraData[biome], gods);
    }
  }
  return { monsters, floraData };
}

function SetupScreen({onComplete}) {
  const [config, setConfig] = useState("");
  const [error, setError] = useState("");
  const [testing, setTesting] = useState(false);

  const handleConnect = async () => {
    setError("");
    setTesting(true);
    try {
      // Parse the config - accept the full Firebase snippet, just the object, or JSON
      let parsed;
      let raw = config.trim();
      // Find the { ... } block that contains apiKey (skip import destructuring braces)
      const apiKeyIdx = raw.indexOf("apiKey");
      if (apiKeyIdx === -1) {
        setError("Could not find apiKey in the pasted config. Make sure you copied the firebaseConfig from Firebase.");
        setTesting(false);
        return;
      }
      // Walk backward from apiKey to find the opening brace
      let braceStart = raw.lastIndexOf("{", apiKeyIdx);
      // Walk forward to find the matching closing brace
      let depth = 0;
      let braceEnd = -1;
      for (let i = braceStart; i < raw.length; i++) {
        if (raw[i] === "{") depth++;
        if (raw[i] === "}") { depth--; if (depth === 0) { braceEnd = i; break; } }
      }
      if (braceStart === -1 || braceEnd === -1) {
        setError("Could not find the config object. Make sure you copied the { ... } block.");
        setTesting(false);
        return;
      }
      raw = raw.slice(braceStart, braceEnd + 1);
      // Fix unquoted keys
      raw = raw.replace(/(\{|,)\s*(\w+)\s*:/g, '$1"$2":');
      // Remove trailing commas before closing brace
      raw = raw.replace(/,\s*\}/g, "}");
      parsed = JSON.parse(raw);

      if (!parsed.apiKey || !parsed.databaseURL) {
        setError("Config needs at least apiKey and databaseURL. Make sure you created a Realtime Database.");
        setTesting(false);
        return;
      }

      const ok = initFirebase(parsed);
      if (!ok) {
        setError("Failed to initialize Firebase. Check your config.");
        setTesting(false);
        return;
      }

      // Test write
      await firebase.database().ref("monster-manual/test").set({t: Date.now()});
      await firebase.database().ref("monster-manual/test").remove();

      // Save config to localStorage
      localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(parsed));
      setTesting(false);
      onComplete(parsed);
    } catch(e) {
      console.error(e);
      setError("Could not connect. Check your config and make sure Realtime Database rules allow read/write. Error: " + e.message);
      setTesting(false);
    }
  };

          />
        </div>

        {error && <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#ef4444",fontSize:13,marginBottom:14}}>{error}</div>}

        <button
          onClick={handleConnect}
          disabled={testing || !config.trim()}
          style={{width:"100%",padding:"12px 24px",borderRadius:8,border:"1px solid #c9a84c50",background:"rgba(201,168,76,0.15)",color:"#c9a84c",fontSize:15,fontFamily:"'Cinzel',serif",letterSpacing:1,opacity:testing||!config.trim()?0.5:1}}
        >
          {testing ? "Connecting..." : "Connect & Start"}
        </button>

        <div style={{textAlign:"center",marginTop:16}}>
          <button onClick={()=>onComplete(null)} style={{background:"transparent",border:"none",color:"rgba(200,180,140,0.4)",fontSize:12,fontFamily:"'Crimson Text',serif",fontStyle:"italic",cursor:"pointer"}}>
            Skip — use local storage only (no cloud sync)
          </button>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("search");
  const [monsters,setMonsters]=useState({...DEFAULT_MONSTERS});
  const [floraData,setFloraData]=useState(JSON.parse(JSON.stringify(DEFAULT_FLORA)));
  const [editState,setEditState]=useState(null);
  const [floraEditState,setFloraEditState]=useState(null);
  const [saveState,setSaveState]=useState("idle");
  const [fbConnected,setFbConnected]=useState(false);
  const [needsSetup,setNeedsSetup]=useState(null); // null=checking, true=show setup, false=ready
  const loaded = useRef(false);

  // Check for saved Firebase config on mount
  useEffect(()=>{
    const savedConfig = localStorage.getItem(FB_CONFIG_KEY);
    if (savedConfig) {
      try {
        const config = JSON.parse(savedConfig);
        const ok = initFirebase(config);
        if (ok) { setFbConnected(true); setNeedsSetup(false); }
        else { setNeedsSetup(true); }
      } catch { setNeedsSetup(true); }
    } else {
      setNeedsSetup(true);
    }
  },[]);

  // Load data once setup is done
  useEffect(()=>{
    if (needsSetup !== false) return;
    (async()=>{
      try {
        if (fbConnected) {
          const data = await fbLoad();
          if (data) {
            const {monsters:m, floraData:f} = applyEdits(data);
            setMonsters(m);
            setFloraData(f);
          }
        } else {
          const raw = localStorage.getItem(SAVE_KEY);
          if (raw) {
            const {monsters:m, floraData:f} = applyEdits(JSON.parse(raw));
            setMonsters(m);
            setFloraData(f);
          }
        }
      } catch(e) { console.error("Load error:", e); }
      loaded.current=true;
    })();
  },[needsSetup, fbConnected]);

  // Save on changes
  useEffect(()=>{
    if(!loaded.current)return;
    setSaveState("saving");
    const t=setTimeout(async()=>{
      try {
        const edits = getEdits(monsters, floraData);
        const hasEdits = Object.keys(edits.m).length > 0 || Object.keys(edits.f).length > 0;
        if (hasEdits) {
          // Always save to localStorage as cache
          localStorage.setItem(SAVE_KEY, JSON.stringify(edits));
          // Save to Firebase if connected
          if (fbConnected) {
            const ok = await fbSave(edits);
            setSaveState(ok ? "cloud" : "local");
          } else {
            setSaveState("local");
          }
        } else {
          setSaveState("saved");
        }
        setTimeout(()=>setSaveState("idle"),2000);
      } catch(e) { console.error("Save error:",e); setSaveState("error"); }
    },800);
    return ()=>clearTimeout(t);
  },[monsters,floraData]);

  const handleSetupComplete = (config) => {
    if (config) {
      setFbConnected(true);
    }
    setNeedsSetup(false);
  };

  const resetFirebase = () => {
    localStorage.removeItem(FB_CONFIG_KEY);
    setFbConnected(false);
    setNeedsSetup(true);
  };

  // Show setup screen if needed
  if (needsSetup === null) return null; // checking
  if (needsSetup) return <><FontLink/><SetupScreen onComplete={handleSetupComplete}/></>;

  const openEdit=(key,god,biome,cr,entry)=>setEditState({key,god,biome,cr,entry});
  const handleSave=(key,form)=>{setMonsters(m=>({...m,[key]:form}));setEditState(null);};
  const handleDelete=key=>{setMonsters(m=>{const n={...m};delete n[key];return n;});setEditState(null);};
  const openFloraEdit=(biome,god,entry)=>setFloraEditState({biome,god,entry});
  const handleFloraSave=(biome,god,form)=>{
    setFloraData(d=>{const n={...d};if(!n[biome])n[biome]={};n[biome]={...n[biome],[god]:form};return n;});
    setFloraEditState(null);
  };

  const filled = Object.values(monsters).filter(e=>e?.name).length;
  const floraFilled = Object.values(floraData).reduce((sum,b)=>sum+Object.values(b).filter(e=>e?.name).length,0);
  const saveLabel = saveState==="saving"?"saving…":saveState==="cloud"?"☁ synced":saveState==="local"?"✓ local":saveState==="error"?"✗ error":"";
  const saveColor = saveState==="error"?"#ef4444":saveState==="cloud"?"#60a5fa":saveState==="local"?"#4ade80":DIM;

  return (
    <>
      <FontLink/>
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#060404,#080606,#05060a)",color:TEXT,fontFamily:"'Crimson Text',serif",padding:"24px 16px 60px"}}>
        <div style={{position:"fixed",inset:0,backgroundImage:"radial-gradient(ellipse 70% 40% at 15% 15%, rgba(180,130,60,0.04) 0%, transparent 60%)",pointerEvents:"none"}}/>
        <div style={{maxWidth:800,margin:"0 auto",position:"relative"}}>
          <div style={{textAlign:"center",marginBottom:22}}>
            <div style={{fontSize:10,letterSpacing:6,color:DIM,fontFamily:"'Cinzel',serif",marginBottom:8}}>WORLDBUILDING CODEX</div>
            <h1 style={{fontFamily:"'Cinzel Decorative',serif",fontSize:26,fontWeight:700,margin:0,background:`linear-gradient(135deg,${G},#e8c87a,${G})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:2}}>MONSTER MANUAL</h1>
            <div style={{fontSize:11,color:DIM,letterSpacing:3,fontFamily:"'Cinzel',serif",marginTop:8}}>
              {"20 GODS · 12 BIOMES · CR 1–30 · "}{filled}{"/1200 FAUNA · "}{floraFilled}{"/240 FLORA"}
              {saveLabel&&<span style={{marginLeft:14,letterSpacing:1,color:saveColor,fontSize:10,fontFamily:"'Crimson Text',serif",fontStyle:"italic"}}>{saveLabel}</span>}
              {fbConnected&&<span style={{marginLeft:8,fontSize:9,color:"#60a5fa",fontFamily:"'Cinzel',serif",letterSpacing:1}}>☁ CLOUD</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:0,justifyContent:"center",marginBottom:26,background:"rgba(8,6,4,0.9)",border:"1px solid rgba(200,170,100,0.15)",borderRadius:8,padding:4,width:"fit-content",margin:"0 auto 26px"}}>
            {[["search","Search"],["tome","Fauna"],["flora","Flora"]].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 20px",borderRadius:6,border:"none",background:tab===id?"rgba(180,130,60,0.18)":"transparent",color:tab===id?G:MUTED,fontSize:13,fontFamily:"'Cinzel',serif",letterSpacing:"0.5px",boxShadow:tab===id?`inset 0 0 0 1px ${G}40`:"none"}}>
                {label}
              </button>
            ))}
          </div>
          <div className="anim" key={tab}>
            {tab==="search"&&<SearchPage monsters={monsters} openEdit={openEdit}/>}
            {tab==="tome"&&<TomePage monsters={monsters} openEdit={openEdit}/>}
            {tab==="flora"&&<FloraPage floraData={floraData} openFloraEdit={openFloraEdit}/>}
          </div>
          {fbConnected&&(
            <div style={{textAlign:"center",marginTop:30}}>
              <button onClick={resetFirebase} style={{background:"transparent",border:"none",color:"rgba(200,180,140,0.25)",fontSize:11,fontFamily:"'Crimson Text',serif",fontStyle:"italic",cursor:"pointer"}}>
                Disconnect Firebase
              </button>
            </div>
          )}
        </div>
      </div>
      {editState&&(
        <EditModal entryKey={editState.key} god={editState.god} biome={editState.biome} cr={editState.cr} entry={editState.entry} onSave={handleSave} onDelete={handleDelete} onClose={()=>setEditState(null)}/>
      )}
      {floraEditState&&(
        <FloraEditModal biome={floraEditState.biome} god={floraEditState.god} entry={floraEditState.entry} onSave={handleFloraSave} onClose={()=>setFloraEditState(null)}/>
      )}
      <BackToTop/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
